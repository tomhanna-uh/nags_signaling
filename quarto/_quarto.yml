project:
  type: book
  output-dir: ../docs

title: "Non-State Armed Groups as Signals in Autocracies"
author: "Tom Hanna"
date: today

bibliography: 
  - references.bib
  - data_sources.bib

format:
  html:
    toc: true
    number-sections: true
    theme: cosmo          # clean, readable theme (change to simplex, flatly, etc. if you prefer)
    code-fold: false
    fig-cap-location: top
    tbl-cap-location: top
  pdf:
    documentclass: report
    classoption: [a4paper, 12pt]
    toc: true
    number-sections: true
    fig-cap-location: top
    tbl-cap-location: top

book:
  chapters:
    - index.qmd
    - introduction.qmd
    - theory.qmd
    - data_methods.qmd
    - paper2_results.qmd
    - paper3_results.qmd
    - conclusion.qmd
    - references.qmd
    - appendix.qmd
    - appendix2.qmd
    - appendix3.qmd