project:
  type: book          # or "manuscript" if you prefer article-style; "book" works well for multi-chapter
  output-dir: ../docs   # renders final documents to the docs/ folder you described as "# final manuscript documents"

title: "Non-State Armed Groups as Signals in Autocracies"
author: "Tom Hanna"
date: today
bibliography: 
  - data_sources.bib
  - references.bib      # adjust filename if your second bibtex file has a different name

format:
  pdf:
    documentclass: article
    classoption: [a4paper, 12pt]
    include-in-header: 
      - style.tex         # if you have a LaTeX style file; otherwise remove
    toc: true
    number-sections: true
    fig-cap-location: top
    tbl-cap-location: top

book:
  chapters:
    - index.qmd
    - introduction.qmd
    - theory.qmd
    - data_methods.qmd
    
    # Paper 2
    - part: "Paper 2: Ideological Commitment Signaling"
      chapters:
        - paper2_results.qmd
    
    # Paper 3
    - part: "Paper 3: Opposition Resolve Signaling"
      chapters:
        - paper3_results.qmd
    
    - conclusion.qmd
    - appendix.qmd
    - references.qmd